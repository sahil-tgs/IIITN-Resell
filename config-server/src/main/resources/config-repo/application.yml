# ─── Shared defaults applied to every service ───
# Service-specific overrides live in <service-name>.yml next to this file.

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,refresh
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 1.0

security:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-string-at-least-32-bytes-please}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false

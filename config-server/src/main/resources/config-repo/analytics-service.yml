server:
  port: 8087

spring:
  datasource:
    url: jdbc:postgresql://${WAREHOUSE_HOST:localhost}:${WAREHOUSE_PORT:5433}/warehouse_db
    username: ${WAREHOUSE_USER:warehouse}
    password: ${WAREHOUSE_PASSWORD:warehouse}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.default_schema: analytics

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:29092}
    consumer:
      group-id: analytics-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.iiitn.resell.common.event"
        spring.json.use.type.headers: false

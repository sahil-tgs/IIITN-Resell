spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          # Local file-backed config repo. Simpler than git for development;
          # in production swap profile to `git` and point at a remote repo.
          search-locations: classpath:/config-repo/

server:
  port: 8888

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh

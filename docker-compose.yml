version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# IIITN-Resell — Java Spring Boot Microservices Infrastructure
# ─────────────────────────────────────────────────────────────────────────────
# Brings up every backing service the platform depends on:
#   * Postgres (OLTP) — one instance, multiple per-service databases
#   * Postgres (OLAP) — separate instance acting as the data warehouse
#   * Redis           — caching + WebSocket presence
#   * Kafka + ZK      — durable event log (product/chat/auth domain events)
#   * RabbitMQ        — work queues (notifications, image processing, etc.)
#   * Elasticsearch   — product search index
#   * Kibana          — search debug UI
#
# Run:    docker compose up -d
# Stop:   docker compose down
# Reset:  docker compose down -v   (wipes all volumes)
# ─────────────────────────────────────────────────────────────────────────────

networks:
  resell-net:
    driver: bridge

volumes:
  postgres-data:
  warehouse-data:
  redis-data:
  kafka-data:
  zk-data:
  rabbitmq-data:
  es-data:

services:

  # ── OLTP Postgres ────────────────────────────────────────────────────────
  # One physical instance, many databases (auth_db, user_db, product_db,
  # chat_db, notification_db). Init script creates all of them at first boot.
  postgres:
    image: postgres:16-alpine
    container_name: resell-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resell}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resell}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres-init:/docker-entrypoint-initdb.d:ro
    networks: [resell-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resell}"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ── OLAP Postgres (Data Warehouse) ───────────────────────────────────────
  # Separate instance so analytical workloads never contend with OLTP.
  # Star schema pre-created by init SQL: dim_user, dim_product, dim_category,
  # dim_date, fact_listing, fact_sale, fact_message.
  postgres-warehouse:
    image: postgres:16-alpine
    container_name: resell-warehouse
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${WAREHOUSE_USER:-warehouse}
      POSTGRES_PASSWORD: ${WAREHOUSE_PASSWORD:-warehouse}
      POSTGRES_DB: warehouse_db
    ports:
      - "5433:5432"
    volumes:
      - warehouse-data:/var/lib/postgresql/data
      - ./infrastructure/warehouse-init:/docker-entrypoint-initdb.d:ro
    networks: [resell-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WAREHOUSE_USER:-warehouse}"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ── Redis ────────────────────────────────────────────────────────────────
  # Used for: read-through cache (products, profiles), online presence map
  # (chat-service), gateway rate-limiter token buckets.
  redis:
    image: redis:7-alpine
    container_name: resell-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks: [resell-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ── Zookeeper (Kafka coordinator) ────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: resell-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk-data:/var/lib/zookeeper/data
    networks: [resell-net]

  # ── Kafka ────────────────────────────────────────────────────────────────
  # Domain event backbone. Topics created automatically on first publish:
  #   product.events.v1, chat.events.v1, auth.events.v1, user.events.v1
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: resell-kafka
    restart: unless-stopped
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks: [resell-net]
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ── RabbitMQ ─────────────────────────────────────────────────────────────
  # Used for task-style work queues (notifications fan-out, email dispatch).
  # Distinct use-case from Kafka: per-message ack, dead-letter, no replay.
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: resell-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-resell}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-resell}
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI: http://localhost:15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks: [resell-net]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ── Elasticsearch ────────────────────────────────────────────────────────
  # search-service indexes products here from product.events.v1 Kafka stream.
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: resell-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks: [resell-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ── Kibana ───────────────────────────────────────────────────────────────
  # UI for inspecting indexed product data: http://localhost:5601
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: resell-kibana
    restart: unless-stopped
    depends_on: [elasticsearch]
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks: [resell-net]

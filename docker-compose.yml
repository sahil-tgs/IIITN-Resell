version: "3.9"

# Minimal local stack: Postgres + Redis to start. Kafka, RabbitMQ and
# Elasticsearch get layered in as their consumers come online.

networks:
  resell-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: resell-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resell}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resell}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [resell-net]

  redis:
    image: redis:7-alpine
    container_name: resell-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks: [resell-net]
